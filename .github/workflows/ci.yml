name: ci

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Setup toolchain
        uses: moonrepo/setup-toolchain@v0.6.4
        with:
          auto-install: true

      - name: Lint conventional commits
        uses: cocogitto/cocogitto-action@v4.2.0
        with:
          command: check

      - name: Install Playwright browser
        working-directory: apps/visualizer
        run: bun --bun playwright install --with-deps --only-shell chromium

      - name: Generate i18n files, build, and run tests
        run: moon run :i18n :build :test

      - name: TypeScript build
        run: bun tsc --build --verbose

      - name: Biome check
        run: bun biome check --verbose --no-errors-on-unmatched .
