$schema: "../.moon/cache/schemas/project.json"

id: sandcastle
language: typescript

fileGroups:
  prompts:
    - "src/prompts/**/*"
  sources:
    - "src/commands/**/*"
    - "src/shared/**/*"
    - "src/types/**/*"
    - "src/workflows/**/*"
    - "main.ts"
  integrationTests:
    - "tests/integration/**/*"
  testHelpers:
    - "tests/helpers/**/*"
  unitTests:
    - "tests/unit/**/*"

tasks:
  build-image:
    command: sandcastle docker build-image --dockerfile .sandcastle/Dockerfile
    description: Build the Sandcastle Docker image
    inputs:
      - "Dockerfile"
      - "/.prototools"
    options:
      cache: false
      interactive: false
      runFromWorkspaceRoot: true
      runInCI: false
    preset: utility

  delivery:
    command: bun --env-file=.sandcastle/.env run .sandcastle/main.ts delivery
    description: Implement and integrate ready delivery workstreams
    inputs:
      - "@group(configs)"
      - "@group(prompts)"
      - "@group(sources)"
      - "@group(workspace)"
    options:
      cache: false
      interactive: false
      runFromWorkspaceRoot: true
      runInCI: false
    type: run

  preview:
    command: bun run .sandcastle/main.ts preview
    description: Start or stop a browser preview for a branch
    inputs:
      - "@group(configs)"
      - "@group(sources)"
      - "@group(workspace)"
    options:
      cache: false
      interactive: false
      runFromWorkspaceRoot: true
      runInCI: false
    type: run

  test:
    command: bun test tests/unit
    description: Run Sandcastle unit tests
    inputs:
      - "@group(configs)"
      - "@group(sources)"
      - "@group(testHelpers)"
      - "@group(unitTests)"
      - "@group(workspace)"
    type: test

  integration-test:
    command: bun test tests/integration
    description: Run Sandcastle integration tests with real local Git repositories
    inputs:
      - "@group(configs)"
      - "@group(prompts)"
      - "@group(sources)"
      - "@group(testHelpers)"
      - "@group(integrationTests)"
      - "@group(workspace)"
    type: test

  validate:
    deps:
      - check
      - integration-test
      - tsc
      - test
    description: Validate the Sandcastle project
    options:
      runDepsInParallel: true
    type: test
